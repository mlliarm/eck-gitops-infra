apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: internal-search
  namespace: elastic-system
spec:
  version: 8.12.0
  nodeSets:
  - name: master-data
    count: 1
    # Crucial Node Configuration Level
    config:
      node.roles: ["master", "data", "ingest"]
    # This block must sit at the nodeSet level, parallel to config
    podTemplate:
      spec:
        containers:
        - name: elasticsearch
          env:
          # The native ECK operator way to inject custom JVM properties safely
          - name: ES_JAVA_OPTS
            value: "-Xms1536m -Xmx1536m"
          resources:
            requests:
              memory: 2Gi
              cpu: "1"
            limits:
              memory: 2.5Gi
              cpu: "1.5"
