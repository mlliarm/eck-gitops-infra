apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: internal-search
  namespace: elastic-system
spec:
  version: 9.0.0
  nodeSets:
  - name: master-data
    count: 1
    config:
      node.roles: ["master", "data", "ingest"]
      esConfig:
        jvm.options: |
          -Xms1.5g
          -Xmx1.5g
    podTemplate:
      spec:
        containers:
        - name: elasticsearch
          resources:
            requests:
              memory: 2Gi
              cpu: "1"
            limits:
              memory: 2.5Gi
              cpu: "1.5"
